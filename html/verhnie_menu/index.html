<!-- ctrl + / = комментарий -->
<!DOCTYPE html>
<!-- указываем язык сайта по умолчанию en - английский -->
<html lang="en">
<!-- "голова" сайта. это раздел который посетитель страницы не видит
 нужен для настроек: -->
<head>
    <!-- кодировка сайта - urf-8 поддерживает кириллицу (рус.язык) -->
    <meta charset="UTF-8">
    <!-- сайт адаптируется под ширину любого устройства
     если этот тег не писать то на телефоне откроется компьютерная версия -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- заголовок страницы, видно когда открыта вкладка наверху -->
    <title>Главная - Название компании</title>
    <!-- relationship - отношение , stylesheet - таблица стилей -->
     <!-- CSS - каскадная таблица стилей -->
    <link rel="stylesheet" href="style.css">
</head>
<!-- тело сайта - то, что посетитель страницы видит -->
<body>
  <!-- пишем название элемента и нажимаем enter или tab или на подсказку
  button + tab

  -->
